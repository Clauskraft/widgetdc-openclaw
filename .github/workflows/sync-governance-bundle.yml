# Weekly governance bundle sync from WidgeTDC
# Copies canonical policy files into .governance-sync/ and commits if changed.
name: Sync Governance Bundle

on:
  schedule:
    - cron: '0 4 * * 0'  # Every Sunday at 04:00 UTC
  workflow_dispatch:      # Manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # For git push
    steps:
      - name: Checkout widgetdc-openclaw
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          path: openclaw

      - name: Checkout WidgeTDC
        uses: actions/checkout@v4
        with:
          repository: Clauskraft/WidgeTDC
          token: ${{ secrets.GITHUB_TOKEN }}
          path: widgetdc
          sparse-checkout: |
            MASTER_POLICY.md
            config/runtime_compliance_policy.json
            config/agent_capability_matrix.json
            config/agent_bootstrap_manifest.json
            docs/OPENCLAW_USAGE_POLICY.md
            docs/AGENT_COMPLIANCE.md

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run sync script
        working-directory: openclaw
        run: node scripts/sync-governance-bundle.mjs "${{ github.workspace }}/widgetdc"

      - name: Check for changes
        id: changes
        working-directory: openclaw
        run: |
          if git diff --quiet .governance-sync/; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        working-directory: openclaw
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .governance-sync/
          git commit -m "chore: sync governance bundle from WidgeTDC (scheduled)"
          git push
